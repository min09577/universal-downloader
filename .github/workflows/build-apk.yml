name: Build Android APK

on:
  push:
    branches: [main]
    paths:
      - 'standalone-android/**'
      - '.github/workflows/build-apk.yml'
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - uses: android-actions/setup-android@v3
        with:
          packages: 'platforms;android-35 build-tools;35.0.0 ndk;26.1.10909125'

      - name: Build APK
        working-directory: standalone-android
        run: |
          echo "sdk.dir=$ANDROID_HOME" > local.properties
          export PYTHON_PATH=$(which python3)
          chmod +x gradlew
          echo "=== Build Info ==="
          echo "ANDROID_HOME=$ANDROID_HOME"
          echo "PYTHON_PATH=$PYTHON_PATH"
          echo "=== Building ==="
          ./gradlew assembleDebug --no-daemon --stacktrace 2>&1 | tee build-output.txt
          EXIT=${PIPESTATUS[0]}
          echo "=== Build exit code: $EXIT ==="
          exit $EXIT

      - name: Upload build log
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: build-log
          path: standalone-android/build-output.txt
          retention-days: 7

      - name: Find and upload APK
        run: |
          APK=$(find standalone-android -name "*.apk" -type f | head -1)
          if [ -n "$APK" ]; then
            echo "APK: $APK ($(du -h "$APK" | cut -f1))"
            echo "apk_path=$APK" >> $GITHUB_OUTPUT
          else
            echo "No APK found"
          fi
        id: apk

      - uses: actions/upload-artifact@v4
        if: steps.apk.outputs.apk_path != ''
        with:
          name: universal-downloader
          path: ${{ steps.apk.outputs.apk_path }}
          retention-days: 90

      - uses: softprops/action-gh-release@v2
        if: steps.apk.outputs.apk_path != ''
        with:
          tag_name: v1.0.0-b${{ github.run_number }}
          name: "万能下载器 Build #${{ github.run_number }}"
          files: ${{ steps.apk.outputs.apk_path }}
          draft: false
          prerelease: false
