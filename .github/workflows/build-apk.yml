name: Build Android APK

on:
  push:
    branches: [main]
    paths:
      - 'standalone-android/**'
      - '.github/workflows/build-apk.yml'
  workflow_dispatch:
    inputs:
      version_name:
        description: 'Version name'
        required: false
        default: '1.0.0'

concurrency:
  group: build-apk-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    name: Build APK
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Setup Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3
        with:
          packages: 'platforms;android-34 build-tools;34.0.0'

      - name: Install Gradle
        run: sudo apt-get update -qq && sudo apt-get install -y -qq gradle

      - name: Generate Gradle wrapper
        working-directory: standalone-android
        run: gradle wrapper --gradle-version 8.5

      - name: Create local.properties
        working-directory: standalone-android
        run: |
          echo "sdk.dir=$ANDROID_HOME" > local.properties
          echo "PYTHON_PATH=$(which python3)" >> $GITHUB_ENV

      - name: Build debug APK
        working-directory: standalone-android
        run: PYTHON_PATH=$(which python3) ./gradlew assembleDebug --no-daemon --stacktrace

      - name: Build release APK
        working-directory: standalone-android
        run: |
          keytool -genkey -v \
            -keystore debug.keystore \
            -alias upload \
            -keyalg RSA -keysize 2048 -validity 10000 \
            -storepass android -keypass android \
            -dname "CN=App,OU=Dev,O=Min,L=BJ,ST=BJ,C=CN" \
            -noprompt 2>/dev/null || true
          PYTHON_PATH=$(which python3) ./gradlew assembleRelease --no-daemon \
            -Pandroid.injected.signing.store.file=debug.keystore \
            -Pandroid.injected.signing.store.password=android \
            -Pandroid.injected.signing.key.alias=upload \
            -Pandroid.injected.signing.key.password=android

      - name: Find APK files
        id: find_apk
        run: |
          echo "=== All APK files ==="
          find standalone-android -name "*.apk" -type f || true
          DEBUG_APK=$(find standalone-android -name "*debug*.apk" -type f 2>/dev/null | head -1 || echo "")
          RELEASE_APK=$(find standalone-android -name "*release*.apk" -type f 2>/dev/null | head -1 || echo "")
          echo "debug_apk=$DEBUG_APK" >> $GITHUB_OUTPUT
          echo "release_apk=$RELEASE_APK" >> $GITHUB_OUTPUT
          if [ -n "$DEBUG_APK" ] && [ -f "$DEBUG_APK" ]; then
            cp "$DEBUG_APK" universal-downloader-debug.apk
            ls -lh universal-downloader-debug.apk
          fi
          if [ -n "$RELEASE_APK" ] && [ -f "$RELEASE_APK" ]; then
            cp "$RELEASE_APK" universal-downloader-release.apk
            ls -lh universal-downloader-release.apk
          fi

      - name: Upload debug APK artifact
        uses: actions/upload-artifact@v4
        if: steps.find_apk.outputs.debug_apk != ''
        with:
          name: universal-downloader-debug
          path: universal-downloader-debug.apk
          retention-days: 30

      - name: Upload release APK artifact
        uses: actions/upload-artifact@v4
        if: steps.find_apk.outputs.release_apk != ''
        with:
          name: universal-downloader-release
          path: universal-downloader-release.apk
          retention-days: 90

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ inputs.version_name || '1.0.0' }}-b${{ github.run_number }}
          name: "万能下载器 v${{ inputs.version_name || '1.0.0' }} (Build #${{ github.run_number }})"
          body: |
            ## 万能下载器 Android APK

            ### 安装方法
            1. 下载 APK 文件
            2. 允许安装未知来源应用
            3. 安装后即可使用

            ### 特性
            - 完全离线运行，无需服务器
            - 支持 1000+ 网站视频/图片下载
            - yt-dlp 引擎内置于 APK

            ### 构建信息
            - Commit: ${{ github.sha }}
          files: |
            universal-downloader-release.apk
            universal-downloader-debug.apk
          draft: false
          prerelease: false
