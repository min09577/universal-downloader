name: Build Android APK

on:
  push:
    branches: [main]
    paths:
      - 'standalone-android/**'
      - '.github/workflows/build-apk.yml'
  workflow_dispatch:
    inputs:
      version_name:
        description: 'Version name'
        required: false
        default: '1.0.0'

concurrency:
  group: build-apk-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    name: Build APK
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      # Chaquopy 需要 Python 3.11 来构建
      - name: Setup Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Verify Python
        run: |
          python3 --version
          which python3
          echo "PYTHON_PATH=$(which python3)" >> $GITHUB_ENV

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3
        with:
          packages: 'platforms;android-34 build-tools;34.0.0'

      - name: Install Gradle and generate wrapper
        working-directory: standalone-android
        run: |
          # Install Gradle
          sudo apt-get update -qq && sudo apt-get install -y -qq gradle
          # Generate wrapper
          gradle wrapper --gradle-version 8.5
          # Make executable
          chmod +x gradlew

      - name: Build debug APK
        working-directory: standalone-android
        env:
          PYTHON_PATH: ${{ env.PYTHON_PATH }}
        run: ./gradlew assembleDebug --no-daemon

      - name: Build release APK
        working-directory: standalone-android
        env:
          PYTHON_PATH: ${{ env.PYTHON_PATH }}
        run: |
          # 生成调试用签名（Release 也可用）
          keytool -genkey -v \
            -keystore debug.keystore \
            -alias upload \
            -keyalg RSA -keysize 2048 -validity 10000 \
            -storepass android \
            -keypass android \
            -dname "CN=Universal Downloader, OU=Dev, O=Min, L=Beijing, ST=Beijing, C=CN" \
            -noprompt 2>/dev/null || true

          # 用 debug 签名构建 release（避免正式签名的复杂性）
          ./gradlew assembleRelease \
            -Pandroid.injected.signing.store.file=debug.keystore \
            -Pandroid.injected.signing.store.password=android \
            -Pandroid.injected.signing.key.alias=upload \
            -Pandroid.injected.signing.key.password=android \
            --no-daemon

      - name: Find APK files
        id: find_apk
        run: |
          echo "=== All APK files ==="
          find standalone-android -name "*.apk" -type f
          DEBUG_APK=$(find standalone-android -name "*debug*.apk" -type f | head -1)
          RELEASE_APK=$(find standalone-android -name "*release*.apk" -type f | head -1)
          echo "debug_apk=$DEBUG_APK" >> $GITHUB_OUTPUT
          echo "release_apk=$RELEASE_APK" >> $GITHUB_OUTPUT
          if [ -f "$DEBUG_APK" ]; then
            cp "$DEBUG_APK" universal-downloader-debug.apk
            echo "Debug APK: $(ls -lh universal-downloader-debug.apk)"
          fi
          if [ -f "$RELEASE_APK" ]; then
            cp "$RELEASE_APK" universal-downloader-release.apk
            echo "Release APK: $(ls -lh universal-downloader-release.apk)"
          fi

      - name: Upload debug APK artifact
        uses: actions/upload-artifact@v4
        if: steps.find_apk.outputs.debug_apk != ''
        with:
          name: universal-downloader-debug
          path: universal-downloader-debug.apk
          retention-days: 30

      - name: Upload release APK artifact
        uses: actions/upload-artifact@v4
        if: steps.find_apk.outputs.release_apk != ''
        with:
          name: universal-downloader-release
          path: universal-downloader-release.apk
          retention-days: 90

      - name: Create Release
        if: github.ref == 'refs/heads/main'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ inputs.version_name || '1.0.0' }}-${{ github.run_number }}
          name: Release v${{ inputs.version_name || '1.0.0' }} (Build #${{ github.run_number }})
          body: |
            ## 万能下载器 Android APK

            ### 安装方法
            1. 下载 `universal-downloader-release.apk`
            2. 允许「安装未知来源应用」
            3. 安装后即可使用

            ### 特性
            - 完全离线运行，无需服务器
            - 支持 1000+ 网站视频/图片下载
            - yt-dlp 引擎内置于 APK

            ### 构建信息
            - 构建时间: ${{ github.event.head_commit.timestamp || 'now' }}
            - Commit: ${{ github.sha }}
          files: |
            universal-downloader-release.apk
            universal-downloader-debug.apk
          draft: false
          prerelease: false
