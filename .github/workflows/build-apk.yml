name: Build Android APK

on:
  push:
    branches: [main]
    paths:
      - 'standalone-android/**'
      - '.github/workflows/build-apk.yml'
  workflow_dispatch:

concurrency:
  group: build-apk-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    name: Build APK
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - uses: android-actions/setup-android@v3
        with:
          packages: 'platforms;android-34 build-tools;34.0.0 ndk;26.1.10909125'

      - name: Verify environment
        run: |
          echo "JAVA_HOME=$JAVA_HOME"
          echo "ANDROID_HOME=$ANDROID_HOME"
          echo "ANDROID_SDK_ROOT=$ANDROID_SDK_ROOT"
          echo "PYTHON=$(which python3) -> $(python3 --version)"
          java -version

      - name: Generate Gradle wrapper
        working-directory: standalone-android
        run: |
          sudo apt-get update -qq && sudo apt-get install -y -qq gradle
          gradle wrapper --gradle-version 8.4

      - name: Configure project
        working-directory: standalone-android
        run: |
          echo "sdk.dir=$ANDROID_HOME" > local.properties
          echo "PYTHON_PATH=$(which python3)" >> $GITHUB_ENV

      - name: Build debug APK
        working-directory: standalone-android
        env:
          PYTHON_PATH: ${{ env.PYTHON_PATH }}
          ANDROID_HOME: ${{ env.ANDROID_HOME }}
        run: |
          echo "=== Environment ==="
          echo "PYTHON_PATH=$PYTHON_PATH"
          echo "ANDROID_HOME=$ANDROID_HOME"
          python3 --version
          echo "=== Test Chaquopy Maven access ==="
          curl -sI https://chaquo.com/maven/com/chaquo/python/gradle-plugin/15.0.1/gradle-plugin-15.0.1.pom | head -5
          echo "=== Resolving dependencies ==="
          ./gradlew dependencies --no-daemon 2>&1 | tail -30
          echo "=== Building ==="
          ./gradlew assembleDebug --no-daemon 2>&1 | tail -100

      - name: Upload debug APK
        uses: actions/upload-artifact@v4
        with:
          name: universal-downloader-debug
          path: standalone-android/app/build/outputs/apk/debug/*.apk
          retention-days: 30

      - name: Build release APK
        working-directory: standalone-android
        env:
          PYTHON_PATH: ${{ env.PYTHON_PATH }}
        run: |
          keytool -genkey -v -keystore debug.keystore -alias upload \
            -keyalg RSA -keysize 2048 -validity 10000 \
            -storepass android -keypass android \
            -dname "CN=UD,OU=Dev,O=Min,L=BJ,ST=BJ,C=CN" -noprompt
          ./gradlew assembleRelease --no-daemon \
            -Pandroid.injected.signing.store.file=debug.keystore \
            -Pandroid.injected.signing.store.password=android \
            -Pandroid.injected.signing.key.alias=upload \
            -Pandroid.injected.signing.key.password=android

      - name: Upload release APK
        uses: actions/upload-artifact@v4
        with:
          name: universal-downloader-release
          path: standalone-android/app/build/outputs/apk/release/*.apk
          retention-days: 90

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v1.0.0-b${{ github.run_number }}
          name: "万能下载器 Build #${{ github.run_number }}"
          body: |
            ## 万能下载器 Android APK

            ### 使用方法
            1. 下载 APK 安装到手机
            2. 粘贴链接即可下载图片/视频
            3. 完全离线运行，无需服务器

            ### 支持平台
            B站、抖音、YouTube、小红书、微博、Instagram、Twitter 等 1000+ 网站

            ### 构建信息
            - Commit: ${{ github.sha }}
            - Build: #${{ github.run_number }}
          files: |
            standalone-android/app/build/outputs/apk/release/*.apk
            standalone-android/app/build/outputs/apk/debug/*.apk
          draft: false
          prerelease: false
