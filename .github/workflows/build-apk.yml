name: Build Android APK

on:
  push:
    branches: [main]
    paths:
      - 'standalone-android/**'
      - '.github/workflows/build-apk.yml'
  workflow_dispatch:

concurrency:
  group: build-apk-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    name: Build APK
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - uses: android-actions/setup-android@v3
        with:
          packages: 'platforms;android-35 build-tools;35.0.0 ndk;26.1.10909125'

      - name: Install Gradle
        run: |
          wget -q https://services.gradle.org/distributions/gradle-8.11.1-bin.zip
          sudo unzip -q gradle-8.11.1-bin.zip -d /opt
          echo "/opt/gradle-8.11.1/bin" >> $GITHUB_PATH
          /opt/gradle-8.11.1/bin/gradle --version

      - name: Build APK
        working-directory: standalone-android
        run: |
          echo "sdk.dir=$ANDROID_HOME" > local.properties
          /opt/gradle-8.11.1/bin/gradle wrapper --gradle-version 8.11.1
          chmod +x gradlew
          ./gradlew assembleDebug --no-daemon

      - name: Collect APK
        run: |
          echo "=== Searching for APK files ==="
          find . -name "*.apk" -type f 2>/dev/null || echo "No APK found"
          mkdir -p output
          APK=$(find standalone-android -name "*.apk" -type f 2>/dev/null | head -1)
          if [ -n "$APK" ] && [ -f "$APK" ]; then
            cp "$APK" output/universal-downloader.apk
            ls -lh output/universal-downloader.apk
            echo "APK_FOUND=true" >> $GITHUB_ENV
          else
            echo "APK_FOUND=false" >> $GITHUB_ENV
          fi

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: universal-downloader
          path: output/universal-downloader.apk
          retention-days: 90

      - name: Create Release
        if: env.APK_FOUND == 'true'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v1.0.0-b${{ github.run_number }}
          name: "万能下载器 Build #${{ github.run_number }}"
          body: |
            ## 万能下载器 Android APK

            ### 安装方法
            1. 下载 APK 安装到手机
            2. 粘贴链接即可下载图片/视频
            3. 完全在手机本地运行，无需服务器

            ### 支持平台
            B站、抖音、YouTube、小红书、微博、Instagram、Twitter 等 1000+ 网站

            ### 构建信息
            - Commit: ${{ github.sha }}
            - Build: #${{ github.run_number }}
          files: output/universal-downloader.apk
          draft: false
          prerelease: false
