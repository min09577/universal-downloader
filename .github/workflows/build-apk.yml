name: Build Android APK

on:
  push:
    branches: [main]
    paths:
      - 'standalone-android/**'
      - '.github/workflows/build-apk.yml'
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - uses: android-actions/setup-android@v3
        with:
          packages: 'platforms;android-35 build-tools;35.0.0 ndk;26.1.10909125'

      - uses: gradle/actions/setup-gradle@v3
        with:
          cache-disabled: true

      - name: Show environment
        run: |
          echo "ANDROID_HOME=$ANDROID_HOME"
          echo "ANDROID_SDK_ROOT=$ANDROID_SDK_ROOT"
          echo "JAVA_HOME=$JAVA_HOME"
          echo "PYTHON_PATH=$(which python3)"
          python3 --version
          java -version

      - name: Build
        working-directory: standalone-android
        run: |
          echo "sdk.dir=$ANDROID_HOME" > local.properties
          gradle wrapper --gradle-version 8.11.1
          chmod +x gradlew
          export PYTHON_PATH=$(which python3)
          echo "PYTHON_PATH=$PYTHON_PATH"
          ./gradlew assembleDebug --no-daemon --stacktrace

      - name: Collect and upload APK
        run: |
          echo "=== APK search ==="
          APK=$(find standalone-android -name "*.apk" -type f 2>/dev/null | head -1)
          if [ -n "$APK" ]; then
            echo "Found: $APK"
            ls -lh "$APK"
            echo "apk_path=$APK" >> $GITHUB_OUTPUT
          else
            echo "No APK found!"
          fi
        id: apk

      - uses: actions/upload-artifact@v4
        if: steps.apk.outputs.apk_path != ''
        with:
          name: universal-downloader-debug
          path: ${{ steps.apk.outputs.apk_path }}
          retention-days: 30

      - uses: softprops/action-gh-release@v2
        if: steps.apk.outputs.apk_path != ''
        with:
          tag_name: v1.0.0-b${{ github.run_number }}
          name: "万能下载器 Build #${{ github.run_number }}"
          files: ${{ steps.apk.outputs.apk_path }}
          draft: false
          prerelease: false
