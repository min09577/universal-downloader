name: Build Android APK

on:
  push:
    branches: [main]
    paths:
      - 'standalone-android/**'
      - '.github/workflows/build-apk.yml'
  workflow_dispatch:

concurrency:
  group: build-apk-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    name: Build APK
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - uses: android-actions/setup-android@v3
        with:
          packages: 'platforms;android-35 build-tools;35.0.0 ndk;26.1.10909125'

      - name: Build APK
        working-directory: standalone-android
        run: |
          echo "sdk.dir=$ANDROID_HOME" > local.properties
          # Download Gradle
          wget -q https://services.gradle.org/distributions/gradle-8.11.1-bin.zip
          unzip -q gradle-8.11.1-bin.zip
          # Generate wrapper
          gradle-8.11.1/bin/gradle wrapper --gradle-version 8.11.1
          chmod +x gradlew
          # Set Python path
          export PYTHON_PATH=$(which python3)
          echo "PYTHON_PATH=$PYTHON_PATH"
          # Build
          ./gradlew assembleDebug --no-daemon --stacktrace 2>&1 | tail -200

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: universal-downloader-debug
          path: standalone-android/app/build/outputs/apk/debug/*.apk
          retention-days: 30

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v1.0.0-b${{ github.run_number }}
          name: "万能下载器 Build #${{ github.run_number }}"
          files: standalone-android/app/build/outputs/apk/debug/*.apk
          draft: false
          prerelease: false
