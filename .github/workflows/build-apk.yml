name: Build Android APK

on:
  push:
    branches: [main]
    paths:
      - 'standalone-android/**'
      - '.github/workflows/build-apk.yml'
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - uses: android-actions/setup-android@v3
        with:
          packages: 'platforms;android-35 build-tools;35.0.0 ndk;26.1.10909125'

      - uses: gradle/actions/setup-gradle@v3
        with:
          cache-disabled: true

      - name: Show environment
        run: |
          echo "ANDROID_HOME=$ANDROID_HOME"
          echo "JAVA_HOME=$JAVA_HOME"
          echo "PYTHON=$(which python3) -> $(python3 --version)"
          ls -la "$ANDROID_HOME/platforms/" 2>/dev/null
          ls -la "$ANDROID_HOME/build-tools/" 2>/dev/null
          which gradle && gradle --version

      - name: Build
        id: build_step
        working-directory: standalone-android
        run: |
          echo "sdk.dir=$ANDROID_HOME" > local.properties
          gradle wrapper --gradle-version 8.11.1
          chmod +x gradlew
          export PYTHON_PATH=$(which python3)
          echo "PYTHON_PATH=$PYTHON_PATH"
          # Build and capture ALL output
          { ./gradlew assembleDebug --no-daemon --stacktrace 2>&1; echo $? > /tmp/build_exit; } | tee build-output.txt
          exit $(cat /tmp/build_exit)

      - name: Upload build output (for debugging)
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: build-log-${{ github.run_number }}
          path: standalone-android/build-output.txt
          retention-days: 7

      - name: Collect APK
        id: apk
        run: |
          APK=$(find standalone-android -name "*.apk" -type f 2>/dev/null | head -1)
          if [ -n "$APK" ]; then
            echo "APK found: $APK ($(du -h "$APK" | cut -f1))"
            echo "apk_path=$APK" >> $GITHUB_OUTPUT
          else
            echo "No APK found - check build-output.txt artifact"
          fi

      - uses: actions/upload-artifact@v4
        if: steps.apk.outputs.apk_path != ''
        with:
          name: universal-downloader
          path: ${{ steps.apk.outputs.apk_path }}
          retention-days: 30

      - uses: softprops/action-gh-release@v2
        if: steps.apk.outputs.apk_path != ''
        with:
          tag_name: v1.0.0-b${{ github.run_number }}
          name: "万能下载器 Build #${{ github.run_number }}"
          files: ${{ steps.apk.outputs.apk_path }}
          draft: false
          prerelease: false
